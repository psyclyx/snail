name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Require tag ref
        if: github.ref_type != 'tag'
        run: |
          echo "Release workflow must run from a tag ref." >&2
          exit 1

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libegl1-mesa-dev \
            libgl1-mesa-dri \
            libglvnd-dev \
            libharfbuzz-dev \
            libvulkan-dev \
            libwayland-dev \
            wayland-protocols

      # install-demo/install-game compile the native-Slang families to
      # SPIR-V at build time (see .github/workflows/ci.yml for details).
      - name: Install slangc (shader-slang)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/slang.zip" \
            https://github.com/shader-slang/slang/releases/download/v2026.5.2/slang-2026.5.2-linux-x86_64.zip
          mkdir -p "$RUNNER_TEMP/slang"
          unzip -q "$RUNNER_TEMP/slang.zip" -d "$RUNNER_TEMP/slang"
          "$RUNNER_TEMP/slang/bin/slangc" -v
          echo "$RUNNER_TEMP/slang/bin" >> "$GITHUB_PATH"

      - name: Test public modules
        run: zig build test -Dcpu=baseline

      - name: Build consumer entry points
        run: |
          zig build install-demo --release=fast -Dcpu=baseline
          zig build install-game --release=fast -Dcpu=baseline
          zig build install-perf --release=fast -Dcpu=baseline

      - name: Backend pixel comparison
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: zig build run-backend-compare -Dcpu=baseline

      - name: Extract release notes for this tag
        id: release_notes
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## " v "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $version; falling back to auto-generated notes." >&2
            echo "fallback=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        run: |
          if [ -s release_notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
