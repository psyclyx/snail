name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libharfbuzz-dev

      - name: Build library
        run: zig build -Dharfbuzz=true --release=fast

      - name: Run tests
        run: zig build test -Dharfbuzz=true

      - name: Package artifacts
        run: |
          mkdir -p snail-${GITHUB_REF_NAME}
          cp zig-out/lib/libsnail.a snail-${GITHUB_REF_NAME}/
          cp zig-out/lib/libsnail.so snail-${GITHUB_REF_NAME}/
          cp zig-out/include/snail.h snail-${GITHUB_REF_NAME}/
          tar czf snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz snail-${GITHUB_REF_NAME}/

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
