name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Releases ship NO binary artifacts, deliberately: snail is a source-first
# Zig library — consumers fetch the repo (zig fetch / package manager) and
# build against their own toolchain. The demo/game/perf entry points are
# development tools, not distributables. Do not "fix" this by attaching
# built binaries to the release.
#
# The tagged commit was already fully gated by CI (every backend pixel gate
# runs on every push), so this workflow only re-runs the cheap test sanity
# check before publishing the release notes.
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Require tag ref
        if: github.ref_type != 'tag'
        run: |
          echo "Release workflow must run from a tag ref." >&2
          exit 1

      # Toolchain (zig, harfbuzz, slangc, mesa/llvmpipe, ...) comes from
      # shell.nix via the npins-pinned nixpkgs — same pin as local dev/CI.
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Test public modules
        run: nix-shell --run "zig build test -Dcpu=baseline"

      - name: Extract release notes for this tag
        id: release_notes
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## " v "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $version; falling back to auto-generated notes." >&2
            echo "fallback=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        run: |
          if [ -s release_notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
