name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Require tag ref
        if: github.ref_type != 'tag'
        run: |
          echo "Release workflow must run from a tag ref." >&2
          exit 1

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            glslc \
            libegl1-mesa-dev \
            libfreetype-dev \
            libgl1-mesa-dri \
            libglvnd-dev \
            libharfbuzz-dev \
            libvulkan-dev \
            libwayland-dev \
            mesa-vulkan-drivers \
            vulkan-validationlayers \
            wayland-protocols

      - name: Check generated C API
        run: zig build check-c-api -Dcpu=baseline

      - name: Run tests
        run: zig build test -Dcpu=baseline

      - name: Build library
        run: zig build --release=fast -Dcpu=baseline -Dgl33=true -Dgl44=true -Dvulkan=true -Draster=true -Dharfbuzz=true

      - name: Build demo
        run: zig build install-demo --release=fast -Dcpu=baseline -Dgl33=true -Dgl44=true -Dvulkan=true -Draster=true -Dharfbuzz=true

      - name: Backend pixel comparison
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: zig build run-backend-compare -Dcpu=baseline -Dgl33=true -Dgl44=true -Dvulkan=true -Draster=true -Dharfbuzz=true

      - name: Package artifacts
        run: |
          mkdir -p snail-${GITHUB_REF_NAME}
          mkdir -p snail-${GITHUB_REF_NAME}/include
          mkdir -p snail-${GITHUB_REF_NAME}/lib/pkgconfig
          cp zig-out/lib/libsnail.a snail-${GITHUB_REF_NAME}/lib/
          cp zig-out/lib/libsnail.so snail-${GITHUB_REF_NAME}/lib/
          cp zig-out/lib/pkgconfig/snail.pc snail-${GITHUB_REF_NAME}/lib/pkgconfig/
          cp zig-out/include/snail*.h snail-${GITHUB_REF_NAME}/include/
          cp LICENSE CHANGELOG.md README.md snail-${GITHUB_REF_NAME}/
          tar czf snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz snail-${GITHUB_REF_NAME}/
          sha256sum snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz > snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256

      - name: Extract release notes for this tag
        id: release_notes
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## " v "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $version; falling back to auto-generated notes." >&2
            echo "fallback=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        run: |
          if [ -s release_notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md \
              snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz \
              snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz \
              snail-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256
          fi
        env:
          GH_TOKEN: ${{ github.token }}
