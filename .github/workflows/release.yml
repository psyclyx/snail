name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Require tag ref
        if: github.ref_type != 'tag'
        run: |
          echo "Release workflow must run from a tag ref." >&2
          exit 1

      # Toolchain (zig, harfbuzz, slangc, mesa/llvmpipe, ...) comes from
      # shell.nix via the npins-pinned nixpkgs — same pin as local dev/CI.
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Test public modules
        run: nix-shell --run "zig build test -Dcpu=baseline"

      # install-demo/install-game compile the native-Slang families to
      # SPIR-V at build time, so they need slangc (from shell.nix).
      - name: Build consumer entry points
        run: |
          nix-shell --run "zig build install-demo --release=fast -Dcpu=baseline"
          nix-shell --run "zig build install-game --release=fast -Dcpu=baseline"
          nix-shell --run "zig build install-perf --release=fast -Dcpu=baseline"

      - name: Backend pixel comparison
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: nix-shell --run "zig build run-backend-compare -Dcpu=baseline"

      - name: Extract release notes for this tag
        id: release_notes
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## " v "( |$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $version; falling back to auto-generated notes." >&2
            echo "fallback=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        run: |
          if [ -s release_notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
