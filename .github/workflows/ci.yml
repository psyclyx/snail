name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libharfbuzz-dev

      - name: Build library
        run: zig build -Dharfbuzz=true --release=fast

      - name: Run tests
        run: zig build test -Dharfbuzz=true
