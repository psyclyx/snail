name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig:
    name: Zig
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            glslc \
            libegl1-mesa-dev \
            libfreetype-dev \
            libgl1-mesa-dri \
            libglvnd-dev \
            libharfbuzz-dev \
            libvulkan-dev \
            libwayland-dev \
            mesa-vulkan-drivers \
            vulkan-validationlayers \
            wayland-protocols

      - name: Check generated C API
        run: zig build check-c-api -Dcpu=baseline

      - name: Test default feature set
        run: zig build test -Dcpu=baseline

      - name: Test without HarfBuzz
        run: zig build test -Dcpu=baseline -Dharfbuzz=false

      - name: Test backend-disabled builds
        run: |
          zig build test -Dcpu=baseline -Dgl33=false -Dgl44=false
          zig build test -Dcpu=baseline -Dvulkan=false
          zig build test -Dcpu=baseline -Draster=false
          zig build test -Dcpu=baseline -Dgl33=false -Dgl44=false -Dgles30=false -Dvulkan=false -Draster=false

      - name: Build release C API libraries
        run: zig build --release=fast -Dcpu=baseline

      - name: Build demos
        run: |
          zig build install-demo --release=fast -Dcpu=baseline
          zig build install-game-demo --release=fast -Dcpu=baseline

      - name: Build demo renderer combinations
        run: |
          zig build install-demo --release=fast -Dcpu=baseline -Dgl33=false -Dgl44=false
          zig build install-demo --release=fast -Dcpu=baseline -Dvulkan=false
          zig build install-demo --release=fast -Dcpu=baseline -Draster=false
          zig build install-demo --release=fast -Dcpu=baseline -Dgl33=false -Dgl44=false -Draster=false
          zig build install-demo --release=fast -Dcpu=baseline -Dvulkan=false -Draster=false
          zig build install-demo --release=fast -Dcpu=baseline -Dgl33=false -Dgl44=false -Dvulkan=false

      - name: Backend pixel comparison
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: zig build run-backend-compare -Dcpu=baseline

      - name: Coverage regression probes
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: |
          zig build run-composite-probe -Dcpu=baseline
          zig build run-coverage-probe -Dcpu=baseline

  nix:
    name: Nix
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build library derivation
        run: nix-build default.nix --no-out-link -A lib

      - name: Build demo derivation
        run: nix-build default.nix --no-out-link -A demo
